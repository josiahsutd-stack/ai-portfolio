    tech_stack: [Python, Streamlit, scikit-learn]
    summary: Primary source-grounded AEC RAG assistant with provenance-rich chunks, retrieval and service-contract evaluation, citations, abstention, bounded durable telemetry, and an authenticated local API boundary.

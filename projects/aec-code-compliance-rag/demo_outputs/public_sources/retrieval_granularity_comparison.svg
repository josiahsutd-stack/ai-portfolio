<text x="868.5" y="489" fill="#24344d" font-family="Arial, sans-serif" font-size="13" font-weight="700">0.778</text>
<rect x="345" y="505" width="623.0" height="12" rx="3" fill="#d65f4a"/>
<text x="978.0" y="516" fill="#24344d" font-family="Arial, sans-serif" font-size="13" font-weight="700">0.944</text>
<rect x="345" y="532" width="568.3" height="12" rx="3" fill="#214a79"/>
<text x="923.3" y="543" fill="#24344d" font-family="Arial, sans-serif" font-size="13" font-weight="700">0.861</text>
<rect x="72" y="620" width="1056" height="44" rx="5" fill="#f3f6f9" stroke="#d8dee8"/>
<text x="94" y="647" fill="#536174" font-family="Arial, sans-serif" font-size="14">Targets are manually labeled from the fixed snapshot, not independent expert labels or regulatory validation.</text>

<text x="999.2" y="293" fill="#24344d" font-family="Arial, sans-serif" font-size="13" font-weight="700">0.976</text>
<text x="72" y="360" fill="#24344d" font-family="Arial, sans-serif" font-size="18" font-weight="700">Exact evidence chunk</text>
<text x="72" y="383" fill="#68768a" font-family="Arial, sans-serif" font-size="13">n=21 - Requires a manually labeled supporting chunk</text>
<rect x="345" y="353" width="534.6" height="12" rx="3" fill="#0d7f78"/>
<text x="889.6" y="364" fill="#24344d" font-family="Arial, sans-serif" font-size="13" font-weight="700">0.810</text>

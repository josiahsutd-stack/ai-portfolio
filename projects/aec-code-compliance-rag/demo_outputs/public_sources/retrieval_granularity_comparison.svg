<line x1="609.0" y1="190" x2="609.0" y2="570" stroke="#e7ebf1"/>
<text x="609.0" y="592" text-anchor="middle" fill="#68768a" font-family="Arial, sans-serif" font-size="13">0.4</text>
<line x1="741.0" y1="190" x2="741.0" y2="570" stroke="#e7ebf1"/>
<text x="741.0" y="592" text-anchor="middle" fill="#68768a" font-family="Arial, sans-serif" font-size="13">0.6</text>
<line x1="873.0" y1="190" x2="873.0" y2="570" stroke="#e7ebf1"/>
<text x="873.0" y="592" text-anchor="middle" fill="#68768a" font-family="Arial, sans-serif" font-size="13">0.8</text>
<line x1="1005.0" y1="190" x2="1005.0" y2="570" stroke="#e7ebf1"/>
<text x="1005.0" y="592" text-anchor="middle" fill="#68768a" font-family="Arial, sans-serif" font-size="13">1.0</text>
<text x="72" y="235" fill="#24344d" font-family="Arial, sans-serif" font-size="18" font-weight="700">Document source</text>
<text x="72" y="258" fill="#68768a" font-family="Arial, sans-serif" font-size="13">n=21 - Finds any chunk from the expected document</text>
<rect x="345" y="228" width="628.3" height="12" rx="3" fill="#0d7f78"/>
<text x="983.3" y="239" fill="#24344d" font-family="Arial, sans-serif" font-size="13" font-weight="700">0.952</text>
<rect x="345" y="255" width="660.0" height="12" rx="3" fill="#d65f4a"/>
<text x="1015.0" y="266" fill="#24344d" font-family="Arial, sans-serif" font-size="13" font-weight="700">1.000</text>

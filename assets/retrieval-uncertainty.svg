<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">AEC retrieval uncertainty intervals</title>
<desc id="desc">Point estimates and 95 percent intervals for a fixed authored public-source retrieval evaluation.</desc>
<rect width="1200" height="760" fill="#fbfcfe"/>
<rect x="28" y="28" width="1144" height="704" rx="8" fill="#ffffff" stroke="#d8dee8"/>
<text x="72" y="88" fill="#12233f" font-family="Arial, sans-serif" font-size="30" font-weight="700">AEC retrieval uncertainty</text>
<text x="72" y="120" fill="#536174" font-family="Arial, sans-serif" font-size="16">Singapore public-source fixed snapshot | 24 authored cases | 21 answerable | 95% intervals</text>
<text x="72" y="157" fill="#0d6f69" font-family="Arial, sans-serif" font-size="14" font-weight="700">CASE-RESAMPLING UNCERTAINTY, NOT EXTERNAL VALIDITY</text>
<line x1="330.0" y1="188" x2="330.0" y2="510" stroke="#e7ebf1"/>
<text x="330.0" y="532" text-anchor="middle" fill="#68768a" font-family="Arial, sans-serif" font-size="13">0.0</text>
<line x1="444.0" y1="188" x2="444.0" y2="510" stroke="#e7ebf1"/>
<text x="444.0" y="532" text-anchor="middle" fill="#68768a" font-family="Arial, sans-serif" font-size="13">0.2</text>
<line x1="558.0" y1="188" x2="558.0" y2="510" stroke="#e7ebf1"/>
<text x="558.0" y="532" text-anchor="middle" fill="#68768a" font-family="Arial, sans-serif" font-size="13">0.4</text>
<line x1="672.0" y1="188" x2="672.0" y2="510" stroke="#e7ebf1"/>
<text x="672.0" y="532" text-anchor="middle" fill="#68768a" font-family="Arial, sans-serif" font-size="13">0.6</text>
<line x1="786.0" y1="188" x2="786.0" y2="510" stroke="#e7ebf1"/>
<text x="786.0" y="532" text-anchor="middle" fill="#68768a" font-family="Arial, sans-serif" font-size="13">0.8</text>
<line x1="900.0" y1="188" x2="900.0" y2="510" stroke="#e7ebf1"/>
<text x="900.0" y="532" text-anchor="middle" fill="#68768a" font-family="Arial, sans-serif" font-size="13">1.0</text>
<text x="72" y="225" fill="#24344d" font-family="Arial, sans-serif" font-size="17" font-weight="600">Hit@1</text>
<line x1="770.6" y1="220" x2="895.4" y2="220" stroke="#d65f4a" stroke-width="8" stroke-linecap="round"/>
<line x1="770.6" y1="210" x2="770.6" y2="230" stroke="#d65f4a" stroke-width="2"/>

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [
  ".",
  "projects/aec-code-compliance-rag/src",
  "experiments/qs-takeoff-tender-analysis/src",
  "experiments/bim-issue-detection-agent/src",
  "experiments/project-specification-copilot/src",
  "experiments/building-energy-ml-pipeline/src",
  "experiments/constraint-aware-massing-explorer/src",
  "experiments/construction-robot-task-planner/src",
  "experiments/site-robot-safety-monitor/src",
  "experiments/multimodal-vlm-visual-qa/src",
  "projects/agentic-research-ops-assistant/src",
  "projects/vla-embodied-agent-simulator/src",
  "experiments/reinforcement-learning-portfolio/src",
  "experiments/deep-learning-vision-lab/src",
  "experiments/llm-evals-guardrails-platform/src",
  "projects/mlops-model-serving-monitoring/src",
  "experiments/recommender-system-ranking-engine/src",
  "experiments/time-series-anomaly-forecasting/src",
  "experiments/fine-tuning-lora-lab/src",
  "projects/real-model-finetune-lab/src"
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"projects/*/app.py" = ["E402", "I001"]
"experiments/*/app.py" = ["E402", "I001"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [
  ".",
  "projects/aec-code-compliance-rag/src",
  "projects/qs-takeoff-tender-analysis/src",
  "experiments/bim-schedule-rule-checker/src",
  "projects/project-specification-copilot/src",
  "experiments/building-energy-ml-pipeline/src",
  "projects/constraint-aware-massing-explorer/src",
  "experiments/construction-grid-route-planner/src",
  "experiments/robot-telemetry-rule-monitor/src",
  "experiments/visual-provider-contract/src",
  "experiments/deterministic-research-workflow/src",
  "projects/vla-embodied-agent-simulator/src",
  "experiments/local-model-serving-monitoring/src",
  "experiments/local-text-classification-lab/src"
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"projects/*/app.py" = ["E402", "I001"]
"experiments/*/app.py" = ["E402", "I001"]

[tool.black]
line-length = 100
target-version = ["py311"]

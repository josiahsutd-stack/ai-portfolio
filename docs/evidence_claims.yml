version: 1
subjects:
  aec-design-to-cost-integration:
    name: AEC Design-To-Cost Integration Contract
    readme_path: integrations/aec-design-to-cost/README.md
    boundary: One synthetic cross-project contract fixture; not professional design, compliance, cost advice, tender evaluation, or project delivery
claims:
  - id: aec-hybrid-retrieval
    project_slug: aec-code-compliance-rag
    artifact: projects/aec-code-compliance-rag/demo_outputs/retrieval_eval_summary.json
    command: python projects/aec-code-compliance-rag/scripts/evaluate_retrieval.py
    evaluation_scope: Bundled synthetic retrieval and abstention regression set
    metrics:
      case_count:
        json_path: summary.case_count
      retrieval_k:
        json_path: summary.k
      recall_at_4:
        json_path: summary.recall_at_k
        decimals: 3
      mrr:
        json_path: summary.mean_reciprocal_rank
        decimals: 3
      hit_at_3:
        json_path: summary.retrieval_hit_at_3
        decimals: 3
    result_template: "Recall@{retrieval_k} {recall_at_4}; MRR {mrr}; Hit@3 {hit_at_3}; {case_count} cases"
    public_surfaces:
      - path: portfolio-site/index.html
        contains:
          - "Recall@{retrieval_k} {recall_at_4}"
          - "MRR {mrr}"
          - "Synthetic {case_count}-case regression set"
      - path: projects/README.md
        contains:
          - "a {case_count}-case regression set"
      - path: docs/technical-review-guide.md
        contains:
          - "The {case_count}-case default set is synthetic"
      - path: projects/aec-code-compliance-rag/README.md
        contains:
          - "| Synthetic regression | {case_count} bundled cases | Recall@{retrieval_k} `{recall_at_4}`; MRR `{mrr}`; Hit@3 `{hit_at_3}` |"
      - path: projects/aec-code-compliance-rag/EVAL.md
        contains:
          - "a {case_count}-case synthetic retrieval and abstention evaluation set"

  - id: aec-public-source-retrieval
    project_slug: aec-code-compliance-rag
    artifact: projects/aec-code-compliance-rag/demo_outputs/public_sources/retrieval_eval_summary.json
    command: python projects/aec-code-compliance-rag/scripts/download_public_sources.py; python projects/aec-code-compliance-rag/scripts/evaluate_retrieval.py --corpus public
    evaluation_scope: Fingerprinted Singapore public-source snapshot with {case_count} authored cases over {document_count} locally downloaded documents
    metrics:
      document_count:
        json_path: provenance.document_count
      case_count:
        json_path: summary.case_count
      hit_at_1:
        json_path: summary.retrieval_hit_at_1
        decimals: 3
      mrr:
        json_path: summary.mean_reciprocal_rank
        decimals: 3
      paraphrase_mrr:
        json_path: summary.case_type_metrics.public_source_paraphrase.mean_reciprocal_rank
        decimals: 3
      no_answer:
        json_path: summary.no_answer_accuracy
        decimals: 3
    result_template: "Hit@1 {hit_at_1}; MRR {mrr}; paraphrase MRR {paraphrase_mrr}; no-answer {no_answer}; {case_count} cases"
    public_surfaces:
      - path: README.md
        contains:
          - "Public {case_count}-case snapshot over {document_count} validated documents: `Hit@1 {hit_at_1}`, `MRR {mrr}`, paraphrase `MRR {paraphrase_mrr}`, and no-answer accuracy `{no_answer}`."
      - path: projects/aec-code-compliance-rag/README.md
        contains:
          - "| Singapore public-source snapshot | {case_count} cases over {document_count} downloaded documents | Hit@1 `{hit_at_1}`; MRR `{mrr}`; paraphrase MRR `{paraphrase_mrr}`; no-answer `{no_answer}` |"
      - path: projects/aec-code-compliance-rag/EVAL.md
        contains:
          - "| Documents | `{document_count}` |"
          - "| Cases | `{case_count}` |"
          - "| Hybrid Hit@1 | `{hit_at_1}` |"
          - "| Hybrid MRR | `{mrr}` |"
          - "| Paraphrase MRR | `{paraphrase_mrr}` |"
          - "| No-answer accuracy | `{no_answer}` |"
      - path: portfolio-site/index.html
        contains:
          - "Public Hit@1 {hit_at_1} / MRR {mrr}"
          - "Public {case_count}-case snapshot over {document_count} local documents"

  - id: constraint-aware-massing
    project_slug: constraint-aware-massing-explorer
    artifact: projects/constraint-aware-massing-explorer/demo_outputs/evaluation_summary.json
    command: python projects/constraint-aware-massing-explorer/evaluate_massing.py
    evaluation_scope: Fixed three-site, three-seed synthetic geometry benchmark with {candidate_count} candidates per mode
    metrics:
      candidate_count:
        json_path: evaluated_candidates_per_mode
      constrained_feasible:
        json_path: aggregate.constraint_aware_feasible_rate
        decimals: 3
      baseline_feasible:
        json_path: aggregate.baseline_feasible_rate
        decimals: 3
      constrained_gfa_error_percent:
        json_path: aggregate.constraint_aware_mean_best_gfa_error_percent
        decimals: 2
      baseline_gfa_error_percent:
        json_path: aggregate.baseline_mean_best_gfa_error_percent
        decimals: 2
    result_template: "Feasible rate {constrained_feasible} vs {baseline_feasible}; mean best GFA error {constrained_gfa_error_percent}% vs {baseline_gfa_error_percent}%; {candidate_count} candidates per mode"
    public_surfaces:
      - path: README.md
        contains:
          - "Across {candidate_count} candidates per method: feasible rate `{constrained_feasible}` versus `{baseline_feasible}` for the unconstrained baseline; mean best GFA error `{constrained_gfa_error_percent}%` versus `{baseline_gfa_error_percent}%`."
      - path: portfolio-site/index.html
        contains:
          - "{constrained_feasible} feasible rate / {constrained_gfa_error_percent}% mean best GFA error"
          - "{candidate_count} candidates per method across synthetic sites"
      - path: projects/constraint-aware-massing-explorer/README.md
        contains:
          - "(`{candidate_count}` candidates per mode in total)"
          - "| Mean feasible-candidate rate | `{constrained_feasible}` | `{baseline_feasible}` |"
          - "| Mean best target-GFA error | `{constrained_gfa_error_percent}%` | `{baseline_gfa_error_percent}%` |"
      - path: projects/constraint-aware-massing-explorer/EVAL.md
        contains:
          - "| Mean feasible-candidate rate | `{constrained_feasible}` | `{baseline_feasible}` |"
          - "| Mean best target-GFA error | `{constrained_gfa_error_percent}%` | `{baseline_gfa_error_percent}%` |"

  - id: specification-copilot-fixtures
    project_slug: project-specification-copilot
    artifact: projects/project-specification-copilot/demo_outputs/evaluation_summary.json
    command: python projects/project-specification-copilot/evaluate_specification.py
    evaluation_scope: Authored deterministic phrase-grammar regression over {case_count} synthetic conversations and {message_count} messages
    metrics:
      case_count:
        json_path: case_count
      message_count:
        json_path: message_count
      extraction_f1:
        json_path: metrics.requirement_extraction_f1
        decimals: 3
      conflict_f1:
        json_path: metrics.open_conflict_f1
        decimals: 3
      approval_f1:
        json_path: metrics.approval_state_f1
        decimals: 3
      clause_f1:
        json_path: metrics.spec_clause_f1
        decimals: 3
      citation_coverage:
        json_path: metrics.requirement_citation_coverage
        decimals: 3
    result_template: "Extraction/conflict/approval/clause F1 {extraction_f1}/{conflict_f1}/{approval_f1}/{clause_f1}; citation coverage {citation_coverage}; {case_count} synthetic cases"
    public_surfaces:
      - path: README.md
        contains:
          - "across {case_count} synthetic conversations and {message_count} messages"
      - path: portfolio-site/index.html
        contains:
          - "{case_count} conversations / {message_count} messages / {extraction_f1} fixture F1"
      - path: projects/project-specification-copilot/README.md
        contains:
          - "contains `{case_count}` synthetic conversations and `{message_count}` messages"
          - "| Requirement extraction F1 | `{extraction_f1}` |"
          - "| Open-conflict F1 | `{conflict_f1}` |"
          - "| Approval-state F1 | `{approval_f1}` |"
          - "| Specification-clause F1 | `{clause_f1}` |"
          - "| Requirement citation coverage | `{citation_coverage}` |"
      - path: projects/project-specification-copilot/EVAL.md
        contains:
          - "over `{message_count}` messages in `{case_count}` synthetic cases"

  - id: qs-takeoff-tender-fixtures
    project_slug: qs-takeoff-tender-analysis
    artifact: projects/qs-takeoff-tender-analysis/demo_outputs/evaluation_summary.json
    command: python projects/qs-takeoff-tender-analysis/evaluate_qs.py
    evaluation_scope: Hand-calculated deterministic fixture regression over {plan_count} synthetic vector plans, {quantity_count} quantity lines, and {tender_count} tenders
    metrics:
      plan_count:
        json_path: scope.plan_count
      quantity_count:
        json_path: scope.quantity_line_count
      tender_count:
        json_path: scope.tender_count
      quantity_exact:
        json_path: metrics.quantity_line_exact_match_rate
        decimals: 3
      wall_mae:
        json_path: metrics.wall_length_mean_absolute_error_m
        decimals: 3
      baseline_wall_mae:
        json_path: metrics.naive_perimeter_wall_mean_absolute_error_m
        decimals: 3
      provenance_coverage:
        json_path: metrics.cost_line_provenance_coverage
        decimals: 3
      tender_f1:
        json_path: metrics.tender_flag_f1
        decimals: 3
    result_template: "Quantity exact match {quantity_exact}; wall MAE {wall_mae} m vs baseline {baseline_wall_mae} m; tender F1 {tender_f1}; {plan_count} plans"
    public_surfaces:
      - path: README.md
        contains:
          - "{quantity_count}/{quantity_count} authored quantities and all 5 tender exceptions reproduced; naive perimeter baseline wall MAE `{baseline_wall_mae} m`, implemented estimator `{wall_mae} m`."
      - path: portfolio-site/index.html
        contains:
          - "{quantity_count}/{quantity_count} quantities / 5/5 tender exceptions"
      - path: projects/qs-takeoff-tender-analysis/README.md
        contains:
          - "| Hand-calculated floor-plan fixtures | {plan_count} |"
          - "| Authored quantity lines | {quantity_count} |"
          - "| Quantity line exact-match rate | {quantity_exact} |"
          - "| Shared-wall estimator MAE | {wall_mae} m |"
          - "| Naive room-perimeter baseline MAE | {baseline_wall_mae} m |"
          - "| Cost lines with geometry and rate provenance | {provenance_coverage} |"
          - "| Tender exception precision / recall / F1 | {tender_f1} / {tender_f1} / {tender_f1} |"
      - path: projects/qs-takeoff-tender-analysis/EVAL.md
        contains:
          - "- {plan_count} synthetic rectangular floor plans"
          - "- {quantity_count} expected quantity lines"
          - "- {tender_count} synthetic anonymous tenders with 5 authored review exceptions"
          - "| Quantity line exact-match rate | {quantity_exact} |"
          - "| Wall-length MAE | {wall_mae} m |"
          - "| Naive perimeter baseline wall-length MAE | {baseline_wall_mae} m |"
          - "| Cost-line provenance coverage | {provenance_coverage} |"
          - "| Tender exception F1 | {tender_f1} |"

  - id: aec-design-to-cost-contract
    project_slug: aec-design-to-cost-integration
    artifact: integrations/aec-design-to-cost/demo_outputs/workflow_trace.json
    command: python integrations/aec-design-to-cost/run_workflow.py
    evaluation_scope: Deterministic cross-project contract over one labeled synthetic workflow fixture
    metrics:
      message_count:
        json_path: specification_handoff.message_count
      approved:
        json_path: specification_handoff.approved_requirement_count
      mapped:
        json_path: specification_handoff.mapped_approved_requirement_count
      retained:
        json_path: specification_handoff.retained_approved_requirement_count
      field_count:
        json_path: scenario_handoff.field_count
      sourced_count:
        json_path: scenario_handoff.sourced_field_count
      source_coverage:
        json_path: scenario_handoff.source_coverage
        decimals: 3
      candidate_count:
        json_path: massing_search.candidate_count
      feasible:
        json_path: massing_search.feasible_candidate_count
      eligible:
        json_path: massing_search.approved_storey_eligible_count
      takeoff_lines:
        json_path: schematic_qs_handoff.takeoff_line_count
      priced_lines:
        json_path: schematic_qs_handoff.priced_line_count
      unpriced_lines:
        json_path: schematic_qs_handoff.unpriced_line_count
      tender_status:
        json_path: tender_stage.status
    result_template: "{approved} approved requirements ({mapped} mapped, {retained} retained); {field_count} sourced fields; {feasible}/{candidate_count} feasible candidates; {eligible} storey-matched; {priced_lines}/{takeoff_lines} priced lines; tender {tender_status}"
    public_surfaces:
      - path: README.md
        contains:
          - "Synthetic workflow fixture: `{approved}` approved requirements (`{mapped}` mapped, `{retained}` retained), `{sourced_count}/{field_count}` sourced scenario fields, `{candidate_count}` candidates (`{feasible}` feasible, `{eligible}` storey-matched), and `{priced_lines}` priced takeoff lines; tender stage `{tender_status}`."
      - path: portfolio-site/index.html
        contains:
          - "{approved} approved / {mapped} mapped / {retained} retained; {sourced_count}/{field_count} sourced fields; {candidate_count} candidates / {feasible} feasible / {eligible} storey-matched; {priced_lines}/{takeoff_lines} priced takeoff lines / tender {tender_status}."
      - path: integrations/aec-design-to-cost/README.md
        contains:
          - "| Conversation messages | {message_count} |"
          - "| Approved requirements | {approved} |"
          - "| Sourced scenario fields | {sourced_count} / {field_count} |"
          - "| Generated massing candidates | {candidate_count} |"
          - "| Feasible candidates | {feasible} |"
          - "| Feasible candidates matching approved storey count | {eligible} |"
          - "| Schematic takeoff lines | {takeoff_lines} |"
          - "| Unpriced takeoff lines | {unpriced_lines} |"
          - "| Tender stage | Not run |"
      - path: integrations/aec-design-to-cost/EVAL.md
        contains:
          - "The checked-in trace records {feasible} feasible candidates, {eligible} feasible storey-matched candidates, and {priced_lines} priced quantity lines with no unpriced lines."

  - id: embodied-behavior-cloning
    project_slug: vla-embodied-agent-simulator
    artifact: projects/vla-embodied-agent-simulator/demo_outputs/behavior_cloning_eval_summary.json
    command: python projects/vla-embodied-agent-simulator/evaluate_vla.py
    evaluation_scope: Fixed-seed disjoint procedural construction-grid holdout
    metrics:
      holdout_scenarios:
        json_path: training.holdout_scenario_count
      holdout_expert_steps:
        json_path: training.holdout_expert_step_count
      action_accuracy:
        json_path: training.holdout_action_accuracy
        decimals: 3
      action_macro_f1:
        json_path: training.holdout_action_macro_f1
        decimals: 3
      raw_success:
        json_path: policies.behavior_cloning_raw.success_rate
        decimals: 3
      raw_unsafe_rate:
        json_path: policies.behavior_cloning_raw.unsafe_action_rate
        decimals: 3
      filtered_success:
        json_path: policies.behavior_cloning_shielded.success_rate
        decimals: 3
      filtered_unsafe_rate:
        json_path: policies.behavior_cloning_shielded.unsafe_action_rate
        decimals: 3
      interventions:
        json_path: policies.behavior_cloning_shielded.intervention_count
      reference_success:
        json_path: policies.safety_shielded.success_rate
        decimals: 3
      reference_unsafe_rate:
        json_path: policies.safety_shielded.unsafe_action_rate
        decimals: 3
    result_template: "Filtered policy success {filtered_success}; unsafe-action rate {filtered_unsafe_rate}; raw success {raw_success}; {holdout_scenarios} holdout scenarios"
    public_surfaces:
      - path: README.md
        contains:
          - "`{filtered_success}` success and `{filtered_unsafe_rate}` unsafe-action rate on {holdout_scenarios} unseen structured-grid scenarios"
          - "raw policy success is `{raw_success}`"
      - path: portfolio-site/index.html
        contains:
          - "{filtered_success} holdout success"
          - "{filtered_unsafe_rate} unsafe-action rate"
          - "{holdout_scenarios} unseen structured-grid scenarios"
      - path: projects/vla-embodied-agent-simulator/README.md
        contains:
          - "`{action_accuracy}` accuracy and `{action_macro_f1}` macro-F1 over {holdout_expert_steps} expert states from {holdout_scenarios} unseen scenarios"
          - "`{raw_success}` success and `{raw_unsafe_rate}` unsafe-action rate over {holdout_scenarios} unseen scenarios"
          - "`{filtered_success}` success, `{filtered_unsafe_rate}` unsafe-action rate, and {interventions} interventions"
          - "`{reference_success}` success and `{reference_unsafe_rate}` unsafe-action rate"
      - path: projects/vla-embodied-agent-simulator/EVAL.md
        contains:
          - "| Holdout expert-action accuracy | `{action_accuracy}` |"
          - "| Holdout expert-action macro-F1 | `{action_macro_f1}` |"
          - "| Raw behavior-cloning success | `{raw_success}` |"
          - "| Raw behavior-cloning unsafe-action rate | `{raw_unsafe_rate}` |"
          - "| Filtered behavior-cloning success | `{filtered_success}` |"
          - "| Filtered behavior-cloning unsafe-action rate | `{filtered_unsafe_rate}` |"
          - "| Filter interventions | `{interventions}` |"
          - "| A* holdout success | `{reference_success}` |"
          - "| A* holdout unsafe-action rate | `{reference_unsafe_rate}` |"
      - path: projects/vla-embodied-agent-simulator/LIMITATIONS.md
        contains:
          - "completes only `{filtered_success}` of holdout tasks"

  - id: public-sms-classification
    project_slug: real-model-finetune-lab
    artifact: experiments/real-model-finetune-lab/demo_outputs/public_sms_metrics.json
    command: python experiments/real-model-finetune-lab/evaluate_model.py
    evaluation_scope: Deterministic source-traceable {train_rows}/{validation_rows}/{test_rows} split of a compact balanced UCI SMS subset
    metrics:
      train_rows:
        json_path: train_rows
      validation_rows:
        json_path: validation_rows
      test_rows:
        json_path: test_rows
      baseline_accuracy:
        json_path: baseline_test_accuracy
        decimals: 3
      validation_accuracy:
        json_path: validation_accuracy
        decimals: 3
      test_accuracy:
        json_path: test_accuracy
        decimals: 3
      test_macro_f1:
        json_path: test_macro_f1
        decimals: 3
    result_template: "Test accuracy {test_accuracy}; macro-F1 {test_macro_f1}; baseline accuracy {baseline_accuracy}; {test_rows} test rows"
    public_surfaces:
      - path: experiments/real-model-finetune-lab/README.md
        contains:
          - "| Public SMS baseline accuracy | `{baseline_accuracy}` |"
          - "| Public SMS validation accuracy | `{validation_accuracy}` |"
          - "| Public SMS test accuracy | `{test_accuracy}` |"
          - "| Public SMS test macro-F1 | `{test_macro_f1}` |"
      - path: experiments/real-model-finetune-lab/EVAL.md
        contains:
          - "| Train rows | `{train_rows}` |"
          - "| Validation rows | `{validation_rows}` |"
          - "| Test rows | `{test_rows}` |"
          - "| Baseline test accuracy | `{baseline_accuracy}` |"
          - "| Validation accuracy | `{validation_accuracy}` |"
          - "| Test accuracy | `{test_accuracy}` |"
          - "| Test macro-F1 | `{test_macro_f1}` |"

  - id: synthetic-building-energy-regression
    project_slug: building-energy-ml-pipeline
    artifact: experiments/building-energy-ml-pipeline/demo_outputs/energy_eval_summary.json
    command: python experiments/building-energy-ml-pipeline/evaluate_model.py
    evaluation_scope: Fixed {train_rows}/{test_rows} split of {row_count} bundled synthetic building rows
    metrics:
      row_count:
        json_path: dataset.row_count
      train_rows:
        json_path: split.train_rows
      test_rows:
        json_path: split.test_rows
      model_mae:
        json_path: model.metrics.mae
        decimals: 2
      model_r2:
        json_path: model.metrics.r2
        decimals: 3
      baseline_mae:
        json_path: baseline.metrics.mae
        decimals: 2
      baseline_r2:
        json_path: baseline.metrics.r2
        decimals: 3
      mae_reduction:
        json_path: comparison.mae_reduction_fraction_vs_mean_baseline
        decimals: 3
    result_template: "Random-forest MAE {model_mae} and R2 {model_r2} vs mean-baseline MAE {baseline_mae}; {test_rows} synthetic holdout rows"
    public_surfaces:
      - path: experiments/building-energy-ml-pipeline/README.md
        contains:
          - "| Data | `{row_count}` synthetic rows |"
          - "| Fixed split | `{train_rows}` train / `{test_rows}` holdout rows |"
          - "| Random-forest MAE | `{model_mae}` kWh/m2/year |"
          - "| Random-forest R2 | `{model_r2}` |"
          - "| Training-mean baseline MAE | `{baseline_mae}` kWh/m2/year |"
          - "| Training-mean baseline R2 | `{baseline_r2}` |"
          - "| MAE reduction relative to baseline | `{mae_reduction}` |"
      - path: experiments/building-energy-ml-pipeline/MODEL_CARD.md
        contains:
          - "contains `{train_rows}` training rows and `{test_rows}` holdout rows"
          - "records MAE `{model_mae}` and R2 `{model_r2}`"
          - "records MAE `{baseline_mae}` and R2 `{baseline_r2}`"
          - "relative to that baseline is `{mae_reduction}`"

  - id: synthetic-robot-safety-rule-execution
    project_slug: site-robot-safety-monitor
    artifact: experiments/site-robot-safety-monitor/demo_outputs/safety_monitor_demo_summary.json
    command: python experiments/site-robot-safety-monitor/generate_demo_report.py
    evaluation_scope: Deterministic rule execution over {row_count} bundled unlabeled synthetic telemetry rows
    metrics:
      row_count:
        json_path: dataset.row_count
      event_count:
        json_path: result.event_count
      high_count:
        json_path: result.high_count
      medium_count:
        json_path: result.medium_count
      first_risk_type:
        json_path: first_event.risk_type
      first_evidence:
        json_path: first_event.evidence
    result_template: "{event_count} rule events ({high_count} high, {medium_count} medium) from {row_count} synthetic rows; no labeled accuracy evaluation"
    public_surfaces:
      - path: experiments/site-robot-safety-monitor/README.md
        contains:
          - "| Synthetic telemetry rows | `{row_count}` |"
          - "| Emitted rule events | `{event_count}` |"
          - "| High-severity events | `{high_count}` |"
          - "| Medium-severity events | `{medium_count}` |"
          - "The first emitted event is `{first_risk_type}`: \"{first_evidence}\""

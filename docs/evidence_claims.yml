  - id: specification-language-stress
    project_slug: project-specification-copilot
    ledger_label: Project Communication and Specification Assistant - Language Stress
    artifact: projects/project-specification-copilot/demo_outputs/language_stress_summary.json
    command: python projects/project-specification-copilot/evaluate_specification.py
    evaluation_scope: Candidate-authored fixed single-message coverage set with direct forms, paraphrases, and negative controls; not blinded or independently labeled
    metrics:
      case_count:
        json_path: case_count
      positive_count:
        json_path: positive_case_count
      negative_count:
        json_path: negative_control_case_count
      stress_precision:
        json_path: metrics.requirement_precision
        decimals: 3
      stress_recall:
        json_path: metrics.requirement_recall
        decimals: 3
      stress_f1:
        json_path: metrics.requirement_f1
        decimals: 3
      exact_accuracy:
        json_path: metrics.exact_case_accuracy
        decimals: 3
      negative_accuracy:
        json_path: metrics.negative_control_accuracy
        decimals: 3
      paraphrase_exact:
        json_path: group_metrics.paraphrase.exact_case_accuracy
        decimals: 3
      failure_count:
        json_path: failure_count
    result_template: "Language stress F1 {stress_f1}; exact-case accuracy {exact_accuracy}; negative-control accuracy {negative_accuracy}; {failure_count} retained misses across {case_count} synthetic cases"
    public_surfaces:
      - path: README.md
        contains:
          - "33-case language stress set records F1 `{stress_f1}`, exact-case accuracy `{exact_accuracy}`, negative-control accuracy `{negative_accuracy}`, and {failure_count} retained number-word misses"
      - path: portfolio-site/index.html
        contains:
          - "{case_count}-case language stress: {stress_f1} F1 / {exact_accuracy} exact"
          - "{failure_count} number-word misses are retained"

version: 1
subjects:
  aec-design-to-cost-integration:
    name: AEC Design-To-Cost Integration Contract
    readme_path: integrations/aec-design-to-cost/README.md
    boundary: One synthetic cross-project contract fixture; not professional design, compliance, cost advice, tender evaluation, or project delivery
claims:
  - id: aec-hybrid-retrieval
    project_slug: aec-code-compliance-rag
    artifact: projects/aec-code-compliance-rag/demo_outputs/retrieval_eval_summary.json
    command: python projects/aec-code-compliance-rag/scripts/evaluate_retrieval.py
    evaluation_scope: Bundled synthetic retrieval and abstention regression set
    metrics:
      case_count:
        json_path: summary.case_count
      answerable_case_count:
        json_path: summary.answerable_case_count
      retrieval_k:
        json_path: summary.k
      recall_at_4:
        json_path: summary.recall_at_k
        decimals: 3
      mrr:
        json_path: summary.mean_reciprocal_rank
        decimals: 3
      hit_at_3:
        json_path: summary.retrieval_hit_at_3
        decimals: 3
    result_template: "Recall@{retrieval_k} {recall_at_4}; MRR {mrr}; Hit@3 {hit_at_3}; {case_count} cases"
    public_surfaces:
      - path: portfolio-site/index.html
        contains:
          - "Recall@{retrieval_k} {recall_at_4}"
          - "MRR {mrr}"
          - "Synthetic {case_count}-case regression set"
      - path: projects/README.md
        contains:
          - "a {case_count}-case regression set"
      - path: docs/technical-review-guide.md
        contains:
          - "The {case_count}-case default set is synthetic"
      - path: projects/aec-code-compliance-rag/README.md
        contains:
          - "| Synthetic regression | {case_count} bundled cases | Recall@{retrieval_k} `{recall_at_4}`; MRR `{mrr}`; Hit@3 `{hit_at_3}` |"
      - path: projects/aec-code-compliance-rag/EVAL.md
        contains:
          - "a {case_count}-case synthetic retrieval and abstention evaluation set"

  - id: aec-public-source-retrieval
    project_slug: aec-code-compliance-rag
    artifact: projects/aec-code-compliance-rag/demo_outputs/public_sources/retrieval_eval_summary.json
    command: python projects/aec-code-compliance-rag/scripts/download_public_sources.py; python projects/aec-code-compliance-rag/scripts/evaluate_retrieval.py --corpus public
    evaluation_scope: Fingerprinted Singapore public-source snapshot with {case_count} authored cases over {document_count} locally downloaded documents
    metrics:
      document_count:
        json_path: provenance.document_count
      case_count:
        json_path: summary.case_count
      hit_at_1:
        json_path: summary.retrieval_hit_at_1
        decimals: 3
      mrr:
        json_path: summary.mean_reciprocal_rank
        decimals: 3
      paraphrase_mrr:
        json_path: summary.case_type_metrics.public_source_paraphrase.mean_reciprocal_rank
        decimals: 3
      no_answer:
        json_path: summary.no_answer_accuracy
        decimals: 3
      evidence_target_case_count:
        json_path: summary.evidence_target_case_count
      exact_hit_at_1:
        json_path: summary.evidence_target_hit_at_1
        decimals: 3
      exact_hit_at_3:
        json_path: summary.evidence_target_hit_at_3
        decimals: 3
      exact_mrr:
        json_path: summary.evidence_target_mean_reciprocal_rank
        decimals: 3
      page_target_case_count:
        json_path: summary.page_target_case_count
      page_hit_at_1:
        json_path: summary.page_target_hit_at_1
        decimals: 3
      page_mrr:
        json_path: summary.page_target_mean_reciprocal_rank
        decimals: 3
    result_template: "Document Hit@1 {hit_at_1}, MRR {mrr}; exact-target Hit@1 {exact_hit_at_1}, MRR {exact_mrr}; page-target Hit@1 {page_hit_at_1}, MRR {page_mrr}; {case_count} cases"
    public_surfaces:
      - path: README.md
        contains:
          - "Public {case_count}-case snapshot over {document_count} validated documents: `Hit@1 {hit_at_1}`, `MRR {mrr}`, paraphrase `MRR {paraphrase_mrr}`, and no-answer accuracy `{no_answer}`."
          - "Candidate-authored exact-target check: Hit@1 `{exact_hit_at_1}`, Hit@3 `{exact_hit_at_3}`, and MRR `{exact_mrr}` across `{evidence_target_case_count}` labeled answerable cases; source-page Hit@1 `{page_hit_at_1}` and MRR `{page_mrr}` across `{page_target_case_count}` page-labeled cases."
      - path: projects/aec-code-compliance-rag/README.md
        contains:
          - "| Singapore public-source snapshot | {case_count} cases over {document_count} downloaded documents | Hit@1 `{hit_at_1}`; MRR `{mrr}`; paraphrase MRR `{paraphrase_mrr}`; no-answer `{no_answer}` |"
          - "Candidate-authored exact-target check: Hit@1 `{exact_hit_at_1}`, Hit@3 `{exact_hit_at_3}`, and MRR `{exact_mrr}` across `{evidence_target_case_count}` labeled answerable cases; source-page Hit@1 `{page_hit_at_1}` and MRR `{page_mrr}` across `{page_target_case_count}` page-labeled cases."
      - path: projects/aec-code-compliance-rag/EVAL.md
        contains:
          - "| Documents | `{document_count}` |"
          - "| Cases | `{case_count}` |"
          - "| Hybrid Hit@1 | `{hit_at_1}` |"
          - "| Hybrid MRR | `{mrr}` |"
          - "| Paraphrase MRR | `{paraphrase_mrr}` |"
          - "| No-answer accuracy | `{no_answer}` |"
          - "| Exact evidence target Hit@1 | `{exact_hit_at_1}` |"
          - "| Exact evidence target Hit@3 | `{exact_hit_at_3}` |"
          - "| Exact evidence target MRR | `{exact_mrr}` |"
          - "| Source-page target Hit@1 | `{page_hit_at_1}` |"
          - "| Source-page target MRR | `{page_mrr}` |"
      - path: portfolio-site/index.html
        contains:
          - "Public Hit@1 {hit_at_1} / MRR {mrr}"
          - "Public {case_count}-case snapshot over {document_count} local documents"
          - "Exact evidence Hit@1 {exact_hit_at_1} / MRR {exact_mrr} on {evidence_target_case_count} candidate-authored targets"
          - "Source-page Hit@1 {page_hit_at_1} / MRR {page_mrr} on {page_target_case_count} page-labeled cases"

  - id: aec-public-source-uncertainty
    project_slug: aec-code-compliance-rag
    artifact: projects/aec-code-compliance-rag/demo_outputs/public_sources/retrieval_uncertainty_summary.json
    command: python projects/aec-code-compliance-rag/scripts/download_public_sources.py; python projects/aec-code-compliance-rag/scripts/evaluate_retrieval.py --corpus public
    evaluation_scope: Fixed-case uncertainty over {all_case_count} authored public-source cases; intervals do not establish external validity
    metrics:
      all_case_count:
        json_path: support.all_cases
      answerable_case_count:
        json_path: support.answerable_cases
      no_answer_case_count:
        json_path: support.no_evidence_cases
      hit_at_1:
        json_path: metrics.retrieval_hit_at_1.point_estimate
        decimals: 3
      hit_lower:
        json_path: metrics.retrieval_hit_at_1.lower
        decimals: 3
      hit_upper:
        json_path: metrics.retrieval_hit_at_1.upper
        decimals: 3
      mrr:
        json_path: metrics.mean_reciprocal_rank.point_estimate
        decimals: 3
      mrr_lower:
        json_path: metrics.mean_reciprocal_rank.lower
        decimals: 3
      mrr_upper:
        json_path: metrics.mean_reciprocal_rank.upper
        decimals: 3
      exact_hit_at_1:
        json_path: metrics.evidence_target_hit_at_1.point_estimate
        decimals: 3
      exact_hit_lower:
        json_path: metrics.evidence_target_hit_at_1.lower
        decimals: 3
      exact_hit_upper:
        json_path: metrics.evidence_target_hit_at_1.upper
        decimals: 3
      exact_mrr:
        json_path: metrics.evidence_target_mean_reciprocal_rank.point_estimate
        decimals: 3
      exact_mrr_lower:
        json_path: metrics.evidence_target_mean_reciprocal_rank.lower
        decimals: 3
      exact_mrr_upper:
        json_path: metrics.evidence_target_mean_reciprocal_rank.upper
        decimals: 3
      page_target_case_count:
        json_path: support.page_target_cases
      page_hit_at_1:
        json_path: metrics.page_target_hit_at_1.point_estimate
        decimals: 3
      page_hit_lower:
        json_path: metrics.page_target_hit_at_1.lower
        decimals: 3
      page_hit_upper:
        json_path: metrics.page_target_hit_at_1.upper
        decimals: 3
      no_answer:
        json_path: metrics.no_answer_accuracy.point_estimate
        decimals: 3
      no_answer_lower:
        json_path: metrics.no_answer_accuracy.lower
        decimals: 3
      no_answer_upper:
        json_path: metrics.no_answer_accuracy.upper
        decimals: 3
      bm25_mrr_delta:
        json_path: paired_mode_comparisons_by_baseline.bm25.metrics.mean_reciprocal_rank.point_estimate
        decimals: 3
      bm25_mrr_lower:
        json_path: paired_mode_comparisons_by_baseline.bm25.metrics.mean_reciprocal_rank.lower
        decimals: 3
      bm25_mrr_upper:
        json_path: paired_mode_comparisons_by_baseline.bm25.metrics.mean_reciprocal_rank.upper
        decimals: 3
      bm25_conclusion:
        json_path: paired_mode_comparisons_by_baseline.bm25.metrics.mean_reciprocal_rank.conclusion
    result_template: "Document Hit@1 {hit_at_1} [{hit_lower}, {hit_upper}]; exact-target Hit@1 {exact_hit_at_1} [{exact_hit_lower}, {exact_hit_upper}], MRR {exact_mrr} [{exact_mrr_lower}, {exact_mrr_upper}]; no-answer {no_answer} [{no_answer_lower}, {no_answer_upper}]; hybrid-vs-BM25 MRR delta {bm25_mrr_delta} [{bm25_mrr_lower}, {bm25_mrr_upper}], {bm25_conclusion}"
    public_surfaces:
      - path: README.md
        contains:
          - "Uncertainty check: public Hit@1 `{hit_at_1}` has a 95% Wilson interval of `[{hit_lower}, {hit_upper}]` over `{answerable_case_count}` answerable cases; MRR `{mrr}` has a 95% bootstrap interval of `[{mrr_lower}, {mrr_upper}]`; no-answer `{no_answer}` is `{no_answer_case_count}/{no_answer_case_count}` with a Wilson interval of `[{no_answer_lower}, {no_answer_upper}]`."
          - "Hybrid versus BM25 MRR delta is `{bm25_mrr_delta}` with a 95% paired interval of `[{bm25_mrr_lower}, {bm25_mrr_upper}]`; the interval includes zero, so mode superiority is inconclusive on this authored set."
          - "Exact-target uncertainty: Hit@1 `{exact_hit_at_1}` has a 95% interval of `[{exact_hit_lower}, {exact_hit_upper}]`, and exact-target MRR `{exact_mrr}` has a 95% interval of `[{exact_mrr_lower}, {exact_mrr_upper}]` across `{answerable_case_count}` candidate-authored targets."
      - path: projects/aec-code-compliance-rag/README.md
        contains:
          - "Uncertainty check: public Hit@1 `{hit_at_1}` has a 95% Wilson interval of `[{hit_lower}, {hit_upper}]` over `{answerable_case_count}` answerable cases; MRR `{mrr}` has a 95% bootstrap interval of `[{mrr_lower}, {mrr_upper}]`; no-answer `{no_answer}` is `{no_answer_case_count}/{no_answer_case_count}` with a Wilson interval of `[{no_answer_lower}, {no_answer_upper}]`."
          - "Hybrid versus BM25 MRR delta is `{bm25_mrr_delta}` with a 95% paired interval of `[{bm25_mrr_lower}, {bm25_mrr_upper}]`; `{bm25_conclusion}`."
          - "Exact-target uncertainty: Hit@1 `{exact_hit_at_1}` has a 95% interval of `[{exact_hit_lower}, {exact_hit_upper}]`, and exact-target MRR `{exact_mrr}` has a 95% interval of `[{exact_mrr_lower}, {exact_mrr_upper}]` across `{answerable_case_count}` candidate-authored targets."
      - path: projects/aec-code-compliance-rag/EVAL.md
        contains:
          - "| Hybrid Hit@1 | `{hit_at_1}` | `[{hit_lower}, {hit_upper}]` | `{answerable_case_count}` answerable cases | Wilson score |"
          - "| Hybrid MRR | `{mrr}` | `[{mrr_lower}, {mrr_upper}]` | `{answerable_case_count}` answerable cases | Percentile bootstrap |"
          - "| No-answer accuracy | `{no_answer}` | `[{no_answer_lower}, {no_answer_upper}]` | `{no_answer_case_count}` no-evidence cases | Wilson score |"
          - "| Exact evidence target Hit@1 | `{exact_hit_at_1}` | `[{exact_hit_lower}, {exact_hit_upper}]` | `{answerable_case_count}` candidate-authored targets | Wilson score |"
          - "| Exact evidence target MRR | `{exact_mrr}` | `[{exact_mrr_lower}, {exact_mrr_upper}]` | `{answerable_case_count}` candidate-authored targets | Percentile bootstrap |"
          - "Hybrid versus BM25 MRR delta is `{bm25_mrr_delta}` with a 95% paired interval of `[{bm25_mrr_lower}, {bm25_mrr_upper}]`; `{bm25_conclusion}`."
      - path: portfolio-site/index.html
        contains:
          - "95% intervals: Hit@1 [{hit_lower}, {hit_upper}], n={answerable_case_count}; MRR [{mrr_lower}, {mrr_upper}]."
          - "Public Hit@1 {hit_at_1} has a 95% Wilson interval of [{hit_lower}, {hit_upper}] over {answerable_case_count} answerable cases; MRR {mrr} has a 95% bootstrap interval of [{mrr_lower}, {mrr_upper}]. No-answer {no_answer} is {no_answer_case_count}/{no_answer_case_count} with a Wilson interval of [{no_answer_lower}, {no_answer_upper}]."
          - "Exact-target uncertainty: Hit@1 {exact_hit_at_1} [{exact_hit_lower}, {exact_hit_upper}] and MRR {exact_mrr} [{exact_mrr_lower}, {exact_mrr_upper}] across {answerable_case_count} candidate-authored targets."

  - id: aec-local-service-contract
    project_slug: aec-code-compliance-rag
    artifact: projects/aec-code-compliance-rag/demo_outputs/service_contract_summary.json
    command: python projects/aec-code-compliance-rag/evaluate_service.py
    evaluation_scope: In-process ASGI contract over the bundled synthetic corpus
    metrics:
      check_count:
        json_path: observed.check_count
      passed_check_count:
        json_path: observed.passed_check_count
      request_count:
        json_path: observed.requests_observed_before_metrics_response
      client_error_count:
        json_path: observed.client_errors_observed_before_metrics_response
    result_template: "{passed_check_count}/{check_count} checks passed; {request_count} requests and {client_error_count} client errors observed before the metrics response"
    public_surfaces:
      - path: README.md
        contains:
          - "{passed_check_count}/{check_count} contract checks passed and {request_count} requests observed before the metrics response"
      - path: projects/aec-code-compliance-rag/README.md
        contains:
          - "| Local service contract | {check_count} in-process ASGI checks | {passed_check_count}/{check_count} checks passed; {request_count} requests and {client_error_count} client errors observed before the metrics response |"
      - path: projects/aec-code-compliance-rag/EVAL.md
        contains:
          - "{passed_check_count}/{check_count} local service contract checks passed; {request_count} requests were observed before the metrics response"
      - path: portfolio-site/index.html
        contains:
          - "{passed_check_count}/{check_count} local contract checks passed; {request_count} requests observed before metrics response"

  - id: aec-local-service-reliability
    project_slug: aec-code-compliance-rag
    artifact: projects/aec-code-compliance-rag/demo_outputs/service_reliability_summary.json
    command: python projects/aec-code-compliance-rag/evaluate_service_reliability.py
    evaluation_scope: Fixed warmed in-process ASGI workload over the bundled synthetic corpus; no network, external deployment, sustained load, or user traffic
    metrics:
      check_count:
        json_path: observed.check_count
      passed_check_count:
        json_path: observed.passed_check_count
      request_count:
        json_path: workload.request_count
      max_concurrency:
        json_path: workload.max_concurrency
      successful_response_count:
        json_path: observed.successful_response_count
      server_error_count:
        json_path: observed.server_error_count
      server_error_rate:
        json_path: observed.server_error_rate
        decimals: 3
      p95_latency_budget_ms:
        json_path: objectives.p95_latency_budget_ms
        decimals: 0
      durable_query_count_after_app_reconstruction:
        json_path: observed.durable_query_count_after_app_reconstruction
    result_template: "{passed_check_count}/{check_count} checks passed; {successful_response_count}/{request_count} HTTP 200 responses; {server_error_count} server errors; P95 at or below {p95_latency_budget_ms} ms; {durable_query_count_after_app_reconstruction} durable query rows after app reconstruction"
    public_surfaces:
      - path: README.md
        contains:
          - "Fixed local workload: {successful_response_count}/{request_count} responses returned 200, zero server errors, and P95 at or below {p95_latency_budget_ms} ms."
          - "A separate fixed in-process workload records {passed_check_count}/{check_count} reliability checks passed: {successful_response_count}/{request_count} responses returned 200, zero server errors, P95 at or below {p95_latency_budget_ms} ms, and {durable_query_count_after_app_reconstruction} durable query rows remained after app reconstruction."
      - path: projects/aec-code-compliance-rag/README.md
        contains:
          - "| Local reliability evaluation | {request_count} requests at maximum concurrency {max_concurrency} | {successful_response_count}/{request_count} responses returned 200; {server_error_count} server errors; P95 at or below {p95_latency_budget_ms} ms; {durable_query_count_after_app_reconstruction} durable query rows survived app reconstruction |"
      - path: projects/aec-code-compliance-rag/EVAL.md
        contains:
          - "Current artifact-backed result: {passed_check_count}/{check_count} reliability checks passed; {successful_response_count}/{request_count} responses returned 200, {server_error_count} server errors were observed, P95 was at or below {p95_latency_budget_ms} ms, and {durable_query_count_after_app_reconstruction} durable query rows survived app reconstruction."
      - path: portfolio-site/index.html
        contains:
          - "fixed workload returned {successful_response_count}/{request_count} HTTP 200 responses, {server_error_count} server errors, and P95 at or below {p95_latency_budget_ms} ms"
          - "{durable_query_count_after_app_reconstruction} payload-free query telemetry rows remained after app reconstruction"

  - id: constraint-aware-massing
    project_slug: constraint-aware-massing-explorer
    artifact: projects/constraint-aware-massing-explorer/demo_outputs/evaluation_summary.json
    command: python projects/constraint-aware-massing-explorer/evaluate_massing.py
    evaluation_scope: Fixed three-site, three-seed synthetic geometry benchmark with {candidate_count} candidates per mode
    metrics:
      candidate_count:
        json_path: evaluated_candidates_per_mode
      constrained_feasible:
        json_path: aggregate.constraint_aware_feasible_rate
        decimals: 3
      baseline_feasible:
        json_path: aggregate.baseline_feasible_rate
        decimals: 3
      constrained_gfa_error_percent:
        json_path: aggregate.constraint_aware_mean_best_gfa_error_percent
        decimals: 2
      baseline_gfa_error_percent:
        json_path: aggregate.baseline_mean_best_gfa_error_percent
        decimals: 2
    result_template: "Feasible rate {constrained_feasible} vs {baseline_feasible}; mean best GFA error {constrained_gfa_error_percent}% vs {baseline_gfa_error_percent}%; {candidate_count} candidates per mode"
    public_surfaces:
      - path: README.md
        contains:
          - "Across {candidate_count} candidates per method: feasible rate `{constrained_feasible}` versus `{baseline_feasible}` for the unconstrained baseline; mean best GFA error `{constrained_gfa_error_percent}%` versus `{baseline_gfa_error_percent}%`."
      - path: portfolio-site/index.html
        contains:
          - "{constrained_feasible} feasible rate / {constrained_gfa_error_percent}% mean best GFA error"
          - "{candidate_count} candidates per method across synthetic sites"
      - path: projects/constraint-aware-massing-explorer/README.md
        contains:
          - "(`{candidate_count}` candidates per mode in total)"
          - "| Mean feasible-candidate rate | `{constrained_feasible}` | `{baseline_feasible}` |"
          - "| Mean best target-GFA error | `{constrained_gfa_error_percent}%` | `{baseline_gfa_error_percent}%` |"
      - path: projects/constraint-aware-massing-explorer/EVAL.md
        contains:
          - "| Mean feasible-candidate rate | `{constrained_feasible}` | `{baseline_feasible}` |"
          - "| Mean best target-GFA error | `{constrained_gfa_error_percent}%` | `{baseline_gfa_error_percent}%` |"

